<!doctype html>
<html lang="it">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Buona Pasqua, amore mio</title>
	<style>
		:root {
			--bg-1: #fff0f5;
			--bg-2: #ffe4e9;
			--card: rgba(255, 255, 255, 0.26);
			--text: #5e2b4d;
			--accent: #ff6f91;
			--accent-2: #ffd166;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", "Trebuchet MS", sans-serif;
			color: var(--text);
			background-image: url(pasqua-romantica.jpg);
			background-position: center center;
			background-repeat: no-repeat;
			background-size: cover;
			background-attachment: fixed;
			display: grid;
			place-items: center;
			padding: 24px;
			overflow-x: hidden;
			overflow-y: auto;
			position: relative;
			isolation: isolate;
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background:
				linear-gradient(150deg, rgba(255, 242, 249, 0.42), rgba(255, 228, 239, 0.34)),
				radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.22), transparent 44%),
				radial-gradient(circle at 78% 82%, rgba(255, 206, 224, 0.2), transparent 38%);
			animation: drift 18s ease-in-out infinite alternate;
			z-index: -2;
			pointer-events: none;
		}

		body::after {
			content: "";
			position: fixed;
			inset: 0;
			background:
				radial-gradient(circle at 8% 16%, rgba(255, 255, 255, 0.52) 0 2px, transparent 3px) 0 0 / 220px 220px,
				radial-gradient(circle at 60% 72%, rgba(255, 210, 224, 0.36) 0 2px, transparent 3px) 0 0 / 250px 250px,
				radial-gradient(ellipse at center, rgba(255, 255, 255, 0) 62%, rgba(156, 45, 86, 0.14) 100%);
			opacity: .34;
			animation: sparkle 20s linear infinite, pulseGlow 9s ease-in-out infinite;
			z-index: -1;
			pointer-events: none;
		}

		.glow {
			position: fixed;
			width: 420px;
			height: 420px;
			border-radius: 50%;
			filter: blur(70px);
			opacity: 0.34;
			pointer-events: none;
		}

		.glow.one {
			background: #ffc2d1;
			top: -120px;
			left: -120px;
		}

		.glow.two {
			background: #ffe066;
			bottom: -150px;
			right: -120px;
		}

		.card {
			width: min(760px, 100%);
			background: var(--card);
			border: 1px solid rgba(255, 255, 255, 0.42);
			border-radius: 24px;
			padding: 34px 28px;
			box-shadow: 0 18px 45px rgba(94, 43, 77, 0.18);
			text-align: center;
			position: relative;
			z-index: 1;
			overflow: hidden;
		}

		.card::before {
			content: "";
			position: absolute;
			inset: -45%;
			background: conic-gradient(from 0deg, rgba(255, 132, 168, 0.1), rgba(255, 236, 178, 0.06), rgba(255, 132, 168, 0.1));
			animation: rotateAura 24s linear infinite;
			pointer-events: none;
		}

		.card::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(130deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.03));
			pointer-events: none;
		}

		.badge {
			display: inline-block;
			background: #ffffff;
			color: var(--accent);
			border: 2px solid #ffd6df;
			padding: 8px 14px;
			border-radius: 999px;
			font-weight: 700;
			letter-spacing: .4px;
		}

		h1 {
			margin: 18px 0 6px;
			font-size: clamp(2rem, 4.8vw, 3.2rem);
			line-height: 1.1;
		}

		.subtitle {
			font-size: clamp(1rem, 2.6vw, 1.26rem);
			margin: 0 auto 24px;
			max-width: 44ch;
			opacity: .9;
		}

		.heart {
			display: inline-block;
			color: var(--accent);
			animation: pulse 1.4s infinite ease-in-out;
			
		}

		@keyframes pulse {
			0%, 100% { transform: scale(1); }
			50% { transform: scale(1.14); }
		}

		button {
			border: 0;
			background: linear-gradient(135deg, var(--accent), #ff8fb1);
			color: #fff;
			padding: 14px 20px;
			font-size: 1rem;
			font-weight: 700;
			border-radius: 14px;
			cursor: pointer;
			transition: transform .15s ease, box-shadow .2s ease;
			box-shadow: 0 10px 20px rgba(255, 111, 145, 0.32);
			position: relative;
			overflow: hidden;
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 14px 24px rgba(255, 111, 145, 0.4);
		}

		button::after {
			content: "";
			position: absolute;
			inset: -150% auto -150% -40%;
			width: 35%;
			transform: rotate(20deg);
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.66), transparent);
			animation: sheen 4.4s ease-in-out infinite;
			pointer-events: none;
		}

		.message {
			margin: 22px auto 0;
			max-width: 52ch;
			background: #fff;
			border: 1px solid #ffe4ec;
			border-radius: 16px;
			padding: 18px;
			font-size: 1.06rem;
			line-height: 1.58;
			opacity: 0;
			transform: translateY(8px);
			transition: opacity .5s ease, transform .5s ease;
		}

		.message.show {
			opacity: 1;
			transform: translateY(0);
		}

		.sign {
			margin-top: 16px;
			font-weight: 700;
			color: #7b355f;
		}

		.eggs {
			display: flex;
			justify-content: center;
			gap: 12px;
			margin-top: 20px;
			font-size: 1.5rem;
		}
		.top-text {
			font-size: clamp(1.5rem, 5vw, 2.2rem);
			margin: 10px 0 14px;
		}

		.art-wrapper {
			position: relative;
			width: min(100%, 580px);
			margin: 100px auto 52px;
			aspect-ratio: 1 / 1;
		}

		.hrt2,
		.hrt1 {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		.hrt2 {
			    z-index: 1;
                transform: scale(1.9);
		}

		.hrt1 {
			    z-index: 0;
                transform: scale(1);
		}

		.h1-letter {
			position: absolute;
			inset: 0;
			display: grid;
			place-items: center;
			z-index: 3;
			margin: 0;
			font-size: clamp(2.6rem, 10vw, 5.8rem);
			color: #a01f43;
			text-shadow: 0 2px 10px rgba(255, 255, 255, .75);
			animation: pulseLetter 3.6s ease-in-out infinite;
		}

		.top-text {
			text-shadow: 0 0 14px rgba(255, 183, 205, .32);
		}

		@keyframes drift {
			0% { transform: translate3d(-2%, -1%, 0) scale(1); }
			50% { transform: translate3d(2%, 1.5%, 0) scale(1.04); }
			100% { transform: translate3d(-1%, 2%, 0) scale(1.02); }
		}

		@keyframes sparkle {
			0% { transform: translate3d(0, 0, 0); }
			50% { transform: translate3d(-16px, 10px, 0); }
			100% { transform: translate3d(0, 0, 0); }
		}

		@keyframes rotateAura {
			to { transform: rotate(360deg); }
		}

		@keyframes sheen {
			0%, 18% { left: -45%; }
			52%, 100% { left: 130%; }
		}

		@keyframes pulseLetter {
			0%, 100% { transform: scale(1); text-shadow: 0 2px 10px rgba(255, 255, 255, .75); }
			50% { transform: scale(1.05); text-shadow: 0 4px 16px rgba(255, 236, 245, .92); }
		}

		@keyframes pulseGlow {
			0%, 100% { opacity: .58; }
			50% { opacity: .72; }
		}

		@media (max-width: 768px) {
			body {
				padding: 14px;
				place-items: start center;
				background-position-x: -71rem;
			}

			.card {
				padding: 20px 20px;
        height: 45rem;
        border-radius: 18px;
			}

			    button {
        width: 83%;
        max-width: 280px;
        padding: 3px 16px;
        font-size: 3rem;
        position: relative;
        top: -21rem;
        z-index: 1000;
    }

			.eggs {
				font-size: 1.25rem;
				gap: 8px;
			}
		}

		@media (max-width: 420px) {
			.top-text {
				font-size: 2.2rem;
				line-height: 1.25;
			}

			.h1-letter {
				font-size: 4.6rem;
                line-height: 3rem;
                color: gold;
			}
		}
 		footer {
			margin-top: 20px;
			font-size: .92rem;
			opacity: .8;
		}

		/* Modal styles (upgraded) */
		.modal-overlay {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(6,10,14,0.48);
			backdrop-filter: blur(6px) saturate(120%);
			padding: 28px;
			z-index: 9999;
			opacity: 0;
			pointer-events: none;
			transition: opacity .22s ease, visibility .22s ease;
		}

		.modal-overlay.open {
			opacity: 1;
			pointer-events: auto;
		}

		.modal-dialog {
			background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,249,250,0.98));
			border-radius: 18px;
			width: 100%;
			max-width: 820px;
			max-height: 92vh;
			box-shadow: 0 30px 80px rgba(16, 20, 28, 0.48), inset 0 1px 0 rgba(255,255,255,0.6);
			display:flex;
			flex-direction:column;
			overflow: hidden;
			transform: translateY(10px) scale(.995);
			transition: transform .26s cubic-bezier(.2,.9,.3,1), box-shadow .2s ease;
			border: 1px solid rgba(255, 200, 220, 0.35);
		}

		.modal-overlay.open .modal-dialog { transform: translateY(0) scale(1); }

		.modal-dialog::before{
			content:"";
			height: 6px;
			display:block;
			background: linear-gradient(90deg, rgba(255,111,145,.95), rgba(255,209,102,.9));
		}

		.modal-header {
			padding: 14px 18px;
			display:flex;
			align-items:center;
			justify-content:space-between;
			gap:12px;
			background: transparent;
		}

		.modal-title {
			font-weight:800;
			color: #7b2e52;
			letter-spacing: .2px;
			font-size: 1.03rem;
		}

		.modal-close {
			background: #fff;
			border: 1px solid rgba(123,53,95,0.08);
			font-size: 1rem;
			cursor: pointer;
			color: #a63b67;
			padding: 8px 10px;
			border-radius: 10px;
			box-shadow: 0 6px 18px rgba(166,59,103,0.08);
			transition: transform .12s ease, box-shadow .12s ease;
		}

		.modal-close:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(166,59,103,0.12); }

		.modal-body {
			padding: 18px 20px 16px 20px;
			overflow: auto;
			flex: 1 1 auto;
			-webkit-overflow-scrolling: touch;
		}

		.modal-footer {
			padding: 12px 18px;
			display:flex;
			gap:10px;
			justify-content:center;
			background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.3));
		}

		.modal-textarea {
			width:100%;
			min-height: 38vh;
			max-height: 78vh;
			padding: 18px;
			border-radius: 12px;
			border: none;
			background: linear-gradient(180deg, #fff, #fffaf2);
			font-size: 1.04rem;
			line-height:1.7;
			color:var(--text);
			box-sizing: border-box;
			box-shadow: inset 0 2px 0 rgba(255,255,255,0.8), 0 8px 28px rgba(156,45,86,0.06);
			font-family: "Georgia", "Times New Roman", serif;
			white-space: pre-wrap;
			overflow: auto;
			-webkit-overflow-scrolling: touch;
		}

		/* custom scrollbar for WebKit */
		.modal-textarea::-webkit-scrollbar { width: 10px; }
		.modal-textarea::-webkit-scrollbar-thumb { background: linear-gradient(#ffd1dc,#ff9ab3); border-radius:8px; }
		.modal-textarea::-webkit-scrollbar-track { background: transparent; }

		@media (max-width: 520px) {
			.modal-dialog { max-width: 100%; height: 100%; border-radius: 12px; }
			.modal-textarea { min-height: 0vh; }
		}
	</style>
</head>
<body>
	
	<main class="card">
		
		<h1 class="top-text">Feliz Pascua 2026 </h1>
		<div class="art-wrapper">
			<img class="hrt2" src="cuore.png" alt="">
			<img class="hrt1" src="cuore1.png" alt="">
			<h1 style="margin-top: -27rem;
    color: red;" class="h1-letter">Andrea</h1>
			<h1   style="margin-top: 21rem;
    color: green; " class="h1-letter">Giorgio</h1>
		</div>
		<img style="    position: relative;
    top: -20rem;
    left: 0rem;
    width: 12rem;" src="coniglietti.png" alt="">
		<button id="openMessage">Abrir!</button>

		<!-- Modal per inserire la lettera lunga -->
		<div id="letterModal" class="modal-overlay" aria-hidden="true" role="dialog" aria-modal="true">
			<div class="modal-dialog" role="document">
				<div class="modal-header">
					<img style="height: 14rem;" src="colombe.jpg" alt="">
				</div>
				
				<div class="modal-body">
					 
					<div id="letterText" class="modal-textarea" role="document" tabindex="0" aria-label="Lettera">
					
					</div>
					<iframe width="560" height="315" src="https://www.youtube.com/embed/r4l1jw8BHoY?si=dO7ncUaZnswaG1ap" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen="" style="
    height: 12rem;
    width: 16rem;
"></iframe>
				</div>
				<div class="modal-footer">
					<!-- footer intentionally empty: modal closes by tapping outside or pressing Esc -->
				</div>
			</div>
		</div>

		<h1 style="position: relative;top: -17rem;" class="top-text">Ti amo immensamente <br> Mi razon de vida!</h1>

		
	</main>

	
	<script>
		(function(){
			const openBtn = document.getElementById('openMessage');
			const modal = document.getElementById('letterModal');
			const letterBox = document.getElementById('letterText');

			// Testo predefinito (sostituisci con il testo definitivo se desideri)
			const letterContent = `Feliz Pascua, amor de mi vida. A ti, que eres la estrella más hermosa y única que ilumina mi camino cada día. Quiero agradecerte por estar a mi lado en cada momento y por ser mi precioso compañero de vida que llena mi corazón de felicidad y amor cada día. A ti, que puedes darme una inmensa felicidad cada día con todo tu precioso amor que me das y que me hace sentir lleno de una energía que no puedo describir, que me hace comenzar el día con el deseo de vivir y enfrentar la vida sin ningún miedo. Porque cada día te tengo aquí a mi lado y cada día me das un amor que viene de lo más profundo de tu precioso corazón que siento latir felizmente mientras te protejo aquí en mis brazos donde quiero abrazarte por toda mi vida y más allá para protegerte cada día de todo mal, porque cada día mereces solo y únicamente las cosas hermosas que la vida tiene para ofrecer, viviéndolas y compartiéndolas juntos. Porque esto es lo más extraordinario: vivir juntos cada momento especial juntos, amor de mi vida, y guardarlo en lo profundo de nuestros corazones que, sincronizados juntos, laten fuerte para transmitir amor puro e infinito. Quiero agradecerte cada día por todo lo especial que haces por mí, amor de mi vida, empezando por cómo cada día, amor de mi vida, me cuidas y me haces sentir completa con todo el precioso amor que me das y que amo porque cada momento es especial para mí, empezando por tus preciosos besos que son más importantes que el oxígeno, me mantienen viva y como el chocolate de un huevo de Pascua, una vez que he comido un trozo, no puedo vivir sin él y quiero llenarte de besos infinitos, mientras me siento segura en mi hogar favorito, tus dulces y preciosos abrazos que amo cuando me reciben y me hacen sentir segura como una niña y amo abrazarte fuerte y escuchar tu dulce voz que cada momento con tus dulces palabras me trae calma y felicidad y solo tú, amor de mi vida, sabes cómo hacerme cerrar los ojos y relajarme, permitiéndome recargar al máximo mi fuerza. Quiero agradecerte por creer en mí cada día, amor de mi vida, y amo estar aquí cada momento, a tu lado, para superar y ganar cada desafío. Mañana por la mañana estaremos listos para comenzar esta nueva aventura en la universidad, donde sabremos darlo todo juntos cada día. Como me enseñas, nunca debemos detenernos. Te deseo, amor de mi vida, un gran comienzo en tu aventura. Que esto te abra nuevos conocimientos y oportunidades, y te permita ampliar tus conocimientos y completar tus estudios. Sé que tendrás que esforzarte más en las lecciones pendientes, pero estoy seguro de que podrás afrontar examen tras examen dando lo mejor de ti, como lo has hecho en ciclos anteriores. Estoy seguro de que sabrás darlo todo en cada examen porque cada día eres el número uno en todo el universo. Quiero decirte, amor de mi vida, que siempre estaré aquí a tu lado para afrontar cada momento juntos, e incluso en esos momentos que parezcan imposibles, estaré aquí para apoyarte con todo mi amor y estaré aquí para animarte a levantarte más fuerte que antes. En cada instante he admirado tu extraordinaria fuerza, amor de mi vida, más grande que un huracán, y esto me da la fuerza y la determinación para estar aquí y afrontar la vida y el trabajo al máximo. Te tomo como ejemplo en cada momento, amor de mi vida, y atesoro todo lo que me enseñas y que cada instante me hace mejor persona contigo a mi lado. Te amo inmensamente desde lo más profundo de mi corazón, que late solo y únicamente por ti, que existe aquí para darte todo mi amor cada día y protegerte mientras acojo tu alma, convirtiéndonos juntos en una sola persona, capaz de afrontar y vencer cualquier desafío. Te amo, te amo infinitamente desde lo más profundo de mi mente, donde cada día eres el sueño más hermoso y único que quiero vivir por toda mi vida y más allá. Te amo incondicionalmente, tú que eres mi preciosa estrella que ilumina el cielo de mi vida, tú que eres el ángel más hermoso y sabio de todo el cielo, tú que eres cada parte que compone mi cuerpo y mi alma, tú que eres la energía que hace latir mi corazón, tú que eres el dulce y precioso pingüino al que quiero amar por toda mi vida y más allá, tú que eres y siempre serás mi dulce e increíble compañera de vida, tu nombre está grabado en mi corazón, ANDREA, y mi voz ama gritarlo a lo largo de mi vida, tú que eres mi dulce e increíble mogliettina capaz de enfrentar cada obstáculo con tu extraordinaria fuerza, tú que eres y siempre serás mi todo! ¡Felices Pascuas, amor de mi vida, y buen comienzo en la universidad, mañana lo darás todo, como siempre, y aquí, de la mano, completaremos cada desafío como uno solo! Que Dios siempre te bendiga, amor de mi vida, junto con nuestra relación que crece y se fortalece hacia el infinito cada día con la unión cada vez mayor de nuestros corazones. ¡Gracias por estar a mi lado cada día, mi precioso compañero de vida! Andrea + Giorgio = Familia hoy, para siempre y más allá.`;

			function openModal(){
				modal.classList.add('open');
				modal.setAttribute('aria-hidden','false');
				document.body.style.overflow = 'hidden';
				// popola il contenuto read-only e porta il focus sul contenitore per consentire lo scroll con tastiera
				letterBox.textContent = letterContent;
				setTimeout(()=>{ letterBox.focus(); }, 120);
			}

			function closeModal(){
				modal.classList.remove('open');
				modal.setAttribute('aria-hidden','true');
				document.body.style.overflow = '';
			}

			openBtn.addEventListener('click', openModal);

			// click sullo sfondo chiude
			modal.addEventListener('click', (e)=>{
				if(e.target === modal) closeModal();
			});

			// ESC per chiudere
			document.addEventListener('keydown', (e)=>{
				if(e.key === 'Escape' && modal.classList.contains('open')) closeModal();
			});



		})();
	</script>
</body>
</html>
