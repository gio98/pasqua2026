<!doctype html>
<html lang="it">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Buona Pasqua, amore mio</title>
	<style>
		:root {
			--bg-1: #fff0f5;
			--bg-2: #ffe4e9;
			--card: rgba(255, 255, 255, 0.26);
			--text: #5e2b4d;
			--accent: #ff6f91;
			--accent-2: #ffd166;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", "Trebuchet MS", sans-serif;
			color: var(--text);
			background-image: url(pasqua-romantica.jpg);
			background-position: center center;
			background-repeat: no-repeat;
			background-size: cover;
			background-attachment: fixed;
			display: grid;
			place-items: center;
			padding: 24px;
			overflow-x: hidden;
			overflow-y: auto;
			position: relative;
			isolation: isolate;
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background:
				linear-gradient(150deg, rgba(255, 242, 249, 0.42), rgba(255, 228, 239, 0.34)),
				radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.22), transparent 44%),
				radial-gradient(circle at 78% 82%, rgba(255, 206, 224, 0.2), transparent 38%);
			animation: drift 18s ease-in-out infinite alternate;
			z-index: -2;
			pointer-events: none;
		}

		body::after {
			content: "";
			position: fixed;
			inset: 0;
			background:
				radial-gradient(circle at 8% 16%, rgba(255, 255, 255, 0.52) 0 2px, transparent 3px) 0 0 / 220px 220px,
				radial-gradient(circle at 60% 72%, rgba(255, 210, 224, 0.36) 0 2px, transparent 3px) 0 0 / 250px 250px,
				radial-gradient(ellipse at center, rgba(255, 255, 255, 0) 62%, rgba(156, 45, 86, 0.14) 100%);
			opacity: .34;
			animation: sparkle 20s linear infinite, pulseGlow 9s ease-in-out infinite;
			z-index: -1;
			pointer-events: none;
		}

		.glow {
			position: fixed;
			width: 420px;
			height: 420px;
			border-radius: 50%;
			filter: blur(70px);
			opacity: 0.34;
			pointer-events: none;
		}

		.glow.one {
			background: #ffc2d1;
			top: -120px;
			left: -120px;
		}

		.glow.two {
			background: #ffe066;
			bottom: -150px;
			right: -120px;
		}

		.card {
			width: min(760px, 100%);
			background: var(--card);
			border: 1px solid rgba(255, 255, 255, 0.42);
			border-radius: 24px;
			padding: 34px 28px;
			box-shadow: 0 18px 45px rgba(94, 43, 77, 0.18);
			text-align: center;
			position: relative;
			z-index: 1;
			overflow: hidden;
		}

		.card::before {
			content: "";
			position: absolute;
			inset: -45%;
			background: conic-gradient(from 0deg, rgba(255, 132, 168, 0.1), rgba(255, 236, 178, 0.06), rgba(255, 132, 168, 0.1));
			animation: rotateAura 24s linear infinite;
			pointer-events: none;
		}

		.card::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(130deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.03));
			pointer-events: none;
		}

		.badge {
			display: inline-block;
			background: #ffffff;
			color: var(--accent);
			border: 2px solid #ffd6df;
			padding: 8px 14px;
			border-radius: 999px;
			font-weight: 700;
			letter-spacing: .4px;
		}

		h1 {
			margin: 18px 0 6px;
			font-size: clamp(2rem, 4.8vw, 3.2rem);
			line-height: 1.1;
		}

		.subtitle {
			font-size: clamp(1rem, 2.6vw, 1.26rem);
			margin: 0 auto 24px;
			max-width: 44ch;
			opacity: .9;
		}

		.heart {
			display: inline-block;
			color: var(--accent);
			animation: pulse 1.4s infinite ease-in-out;
			
		}

		@keyframes pulse {
			0%, 100% { transform: scale(1); }
			50% { transform: scale(1.14); }
		}

		button {
			border: 0;
			background: linear-gradient(135deg, var(--accent), #ff8fb1);
			color: #fff;
			padding: 14px 20px;
			font-size: 1rem;
			font-weight: 700;
			border-radius: 14px;
			cursor: pointer;
			transition: transform .15s ease, box-shadow .2s ease;
			box-shadow: 0 10px 20px rgba(255, 111, 145, 0.32);
			position: relative;
			overflow: hidden;
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 14px 24px rgba(255, 111, 145, 0.4);
		}

		button::after {
			content: "";
			position: absolute;
			inset: -150% auto -150% -40%;
			width: 35%;
			transform: rotate(20deg);
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.66), transparent);
			animation: sheen 4.4s ease-in-out infinite;
			pointer-events: none;
		}

		.message {
			margin: 22px auto 0;
			max-width: 52ch;
			background: #fff;
			border: 1px solid #ffe4ec;
			border-radius: 16px;
			padding: 18px;
			font-size: 1.06rem;
			line-height: 1.58;
			opacity: 0;
			transform: translateY(8px);
			transition: opacity .5s ease, transform .5s ease;
		}

		.message.show {
			opacity: 1;
			transform: translateY(0);
		}

		.sign {
			margin-top: 16px;
			font-weight: 700;
			color: #7b355f;
		}

		.eggs {
			display: flex;
			justify-content: center;
			gap: 12px;
			margin-top: 20px;
			font-size: 1.5rem;
		}
		.top-text {
			font-size: clamp(1.5rem, 5vw, 2.2rem);
			margin: 10px 0 14px;
		}

		.art-wrapper {
			position: relative;
			width: min(100%, 580px);
			margin: 100px auto 52px;
			aspect-ratio: 1 / 1;
		}

		.hrt2,
		.hrt1 {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		.hrt2 {
			    z-index: 1;
                transform: scale(1.9);
		}

		.hrt1 {
			    z-index: 0;
                transform: scale(1);
		}

		.h1-letter {
			position: absolute;
			inset: 0;
			display: grid;
			place-items: center;
			z-index: 3;
			margin: 0;
			font-size: clamp(2.6rem, 10vw, 5.8rem);
			color: #a01f43;
			text-shadow: 0 2px 10px rgba(255, 255, 255, .75);
			animation: pulseLetter 3.6s ease-in-out infinite;
		}

		.top-text {
			text-shadow: 0 0 14px rgba(255, 183, 205, .32);
		}

		@keyframes drift {
			0% { transform: translate3d(-2%, -1%, 0) scale(1); }
			50% { transform: translate3d(2%, 1.5%, 0) scale(1.04); }
			100% { transform: translate3d(-1%, 2%, 0) scale(1.02); }
		}

		@keyframes sparkle {
			0% { transform: translate3d(0, 0, 0); }
			50% { transform: translate3d(-16px, 10px, 0); }
			100% { transform: translate3d(0, 0, 0); }
		}

		@keyframes rotateAura {
			to { transform: rotate(360deg); }
		}

		@keyframes sheen {
			0%, 18% { left: -45%; }
			52%, 100% { left: 130%; }
		}

		@keyframes pulseLetter {
			0%, 100% { transform: scale(1); text-shadow: 0 2px 10px rgba(255, 255, 255, .75); }
			50% { transform: scale(1.05); text-shadow: 0 4px 16px rgba(255, 236, 245, .92); }
		}

		@keyframes pulseGlow {
			0%, 100% { opacity: .58; }
			50% { opacity: .72; }
		}

		@media (max-width: 768px) {
			body {
				padding: 14px;
				place-items: start center;
				background-position-x: -71rem;
			}

			.card {
				padding: 20px 20px;
        height: 45rem;
        border-radius: 18px;
			}

			    button {
        width: 83%;
        max-width: 280px;
        padding: 3px 16px;
        font-size: 3rem;
        position: relative;
        top: -21rem;
        z-index: 1000;
    }

			.eggs {
				font-size: 1.25rem;
				gap: 8px;
			}
		}

		@media (max-width: 420px) {
			.top-text {
				font-size: 2.2rem;
				line-height: 1.25;
			}

			.h1-letter {
				font-size: 5.2rem;
                line-height: 3rem;
                color: gold;
			}
		}
 		footer {
			margin-top: 20px;
			font-size: .92rem;
			opacity: .8;
		}

		/* Modal styles (upgraded) */
		.modal-overlay {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(6,10,14,0.48);
			backdrop-filter: blur(6px) saturate(120%);
			padding: 28px;
			z-index: 9999;
			opacity: 0;
			pointer-events: none;
			transition: opacity .22s ease, visibility .22s ease;
		}

		.modal-overlay.open {
			opacity: 1;
			pointer-events: auto;
		}

		.modal-dialog {
			background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,249,250,0.98));
			border-radius: 18px;
			width: 100%;
			max-width: 820px;
			max-height: 92vh;
			box-shadow: 0 30px 80px rgba(16, 20, 28, 0.48), inset 0 1px 0 rgba(255,255,255,0.6);
			display:flex;
			flex-direction:column;
			overflow: hidden;
			transform: translateY(10px) scale(.995);
			transition: transform .26s cubic-bezier(.2,.9,.3,1), box-shadow .2s ease;
			border: 1px solid rgba(255, 200, 220, 0.35);
		}

		.modal-overlay.open .modal-dialog { transform: translateY(0) scale(1); }

		.modal-dialog::before{
			content:"";
			height: 6px;
			display:block;
			background: linear-gradient(90deg, rgba(255,111,145,.95), rgba(255,209,102,.9));
		}

		.modal-header {
			padding: 14px 18px;
			display:flex;
			align-items:center;
			justify-content:space-between;
			gap:12px;
			background: transparent;
		}

		.modal-title {
			font-weight:800;
			color: #7b2e52;
			letter-spacing: .2px;
			font-size: 1.03rem;
		}

		.modal-close {
			background: #fff;
			border: 1px solid rgba(123,53,95,0.08);
			font-size: 1rem;
			cursor: pointer;
			color: #a63b67;
			padding: 8px 10px;
			border-radius: 10px;
			box-shadow: 0 6px 18px rgba(166,59,103,0.08);
			transition: transform .12s ease, box-shadow .12s ease;
		}

		.modal-close:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(166,59,103,0.12); }

		.modal-body {
			padding: 18px 20px 16px 20px;
			overflow: auto;
			flex: 1 1 auto;
			-webkit-overflow-scrolling: touch;
		}

		.modal-footer {
			padding: 12px 18px;
			display:flex;
			gap:10px;
			justify-content:center;
			background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.3));
		}

		.modal-textarea {
			width:100%;
			min-height: 38vh;
			max-height: 78vh;
			padding: 18px;
			border-radius: 12px;
			border: none;
			background: linear-gradient(180deg, #fff, #fffaf2);
			font-size: 1.04rem;
			line-height:1.7;
			color:var(--text);
			box-sizing: border-box;
			box-shadow: inset 0 2px 0 rgba(255,255,255,0.8), 0 8px 28px rgba(156,45,86,0.06);
			font-family: "Georgia", "Times New Roman", serif;
			white-space: pre-wrap;
			overflow: auto;
			-webkit-overflow-scrolling: touch;
		}

		/* custom scrollbar for WebKit */
		.modal-textarea::-webkit-scrollbar { width: 10px; }
		.modal-textarea::-webkit-scrollbar-thumb { background: linear-gradient(#ffd1dc,#ff9ab3); border-radius:8px; }
		.modal-textarea::-webkit-scrollbar-track { background: transparent; }

		@media (max-width: 520px) {
			.modal-dialog { max-width: 100%; height: 100%; border-radius: 12px; }
			.modal-textarea { min-height: 80vh; }
		}
	</style>
</head>
<body>
	
	<main class="card">
		
		<h1 class="top-text">Feliz Pascua 2026 </h1>
		<div class="art-wrapper">
			<img class="hrt2" src="cuore.png" alt="">
			<img class="hrt1" src="cuore1.png" alt="">
			<h1 style="margin-top: -25rem;
    color: red;" class="h1-letter">Andrea</h1>
			<h1   style="margin-top: 20rem;
    color: green; " class="h1-letter">Giorgio</h1>
		</div>
		<img style="    position: relative;
    top: -20rem;
    left: 0rem;
    width: 12rem;" src="coniglietti.png" alt="">
		<button id="openMessage">Abrir!</button>

		<!-- Modal per inserire la lettera lunga -->
		<div id="letterModal" class="modal-overlay" aria-hidden="true" role="dialog" aria-modal="true">
			<div class="modal-dialog" role="document">
				<div class="modal-header">
					
				</div>
				<div class="modal-body">
					<div id="letterText" class="modal-textarea" role="document" tabindex="0" aria-label="Lettera"></div>
				</div>
				<div class="modal-footer">
					<!-- footer intentionally empty: modal closes by tapping outside or pressing Esc -->
				</div>
			</div>
		</div>

		<h1 style="position: relative;top: -15rem;" class="top-text">Ti amo immensamente <br> Mi razon de vida!</h1>

		
	</main>

	
	<script>
		(function(){
			const openBtn = document.getElementById('openMessage');
			const modal = document.getElementById('letterModal');
			const letterBox = document.getElementById('letterText');

			// Testo predefinito (sostituisci con il testo definitivo se desideri)
			const letterContent = ``;

			function openModal(){
				modal.classList.add('open');
				modal.setAttribute('aria-hidden','false');
				document.body.style.overflow = 'hidden';
				// popola il contenuto read-only e porta il focus sul contenitore per consentire lo scroll con tastiera
				letterBox.textContent = letterContent;
				setTimeout(()=>{ letterBox.focus(); }, 120);
			}

			function closeModal(){
				modal.classList.remove('open');
				modal.setAttribute('aria-hidden','true');
				document.body.style.overflow = '';
			}

			openBtn.addEventListener('click', openModal);

			// click sullo sfondo chiude
			modal.addEventListener('click', (e)=>{
				if(e.target === modal) closeModal();
			});

			// ESC per chiudere
			document.addEventListener('keydown', (e)=>{
				if(e.key === 'Escape' && modal.classList.contains('open')) closeModal();
			});



		})();
	</script>
</body>
</html>
